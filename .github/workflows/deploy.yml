# Build → ./docs/, commit if changed. Pages uses branch main / folder "/docs".
# Repo root stays the Vite dev entry (still needed for `npm run dev`).
name: Build site for Pages

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: pages-docs
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - run: npm ci
      - run: npm run build

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: refresh GitHub Pages build [skip ci]"
